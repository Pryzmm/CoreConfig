plugins {
    id 'java'
    id 'maven-publish'
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.jetbrains:annotations:24.0.0'
    compileOnly 'org.slf4j:slf4j-api:2.0.7'
}

publishing {
    publications {
        release(MavenPublication) {
            from components.java
        }
    }
}